services:
  db:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-batikcraft}
      MYSQL_USER: ${MYSQL_USER:-batikcraft}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-change-me}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-change-root-password}
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - mysql_data:/var/lib/mysql

  web:
    build:
      context: .
      dockerfile: Dockerfile.mysql
    restart: unless-stopped
    command: sh -c "python manage.py migrate && gunicorn batikcraft_web.wsgi:application --bind 0.0.0.0:8000"
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql://${MYSQL_USER:-batikcraft}:${MYSQL_PASSWORD:-change-me}@db:3306/${MYSQL_DATABASE:-batikcraft}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - media_data:/app/media

volumes:
  mysql_data:
  media_data:
