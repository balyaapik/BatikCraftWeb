name: Prepare auction payment main merge

on:
  push:
    branches:
      - agent/prepare-auction-main-merge

permissions:
  contents: write

jobs:
  prepare-clean-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Check out main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Build clean feature commit on main
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin agent/auction-payment-mint-flow
          git read-tree --reset -u origin/agent/auction-payment-mint-flow
          git commit -m "Add auction payment settlement and NFT mint flow"
          git push --force origin HEAD:refs/heads/agent/auction-payment-mint-flow-main-ready
