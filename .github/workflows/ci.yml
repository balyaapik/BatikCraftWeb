name: Django CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -q -r requirements-dev.txt
      - run: python manage.py check
      - name: Run Django tests
        run: python manage.py test 2>&1 | tee django-test.log
      - name: Upload Django test log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: django-test-log-${{ github.run_id }}
          path: django-test.log
      - run: ruff check .
