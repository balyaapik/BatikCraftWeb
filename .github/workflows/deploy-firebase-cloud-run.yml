name: Deploy Firebase and Cloud Run

on:
  workflow_dispatch:
    inputs:
      run_migrations:
        description: Run Django database migrations before deploying the web service
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: batikcraft-production-deploy
  cancel-in-progress: false

env:
  REGION: asia-southeast2
  SERVICE: batikcraft-web
  MIGRATION_JOB: batikcraft-migrate
  ARTIFACT_REPOSITORY: batikcraft

jobs:
  deploy:
    name: Deploy production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment configuration
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          WIF_PROVIDER: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          DEPLOYER_SERVICE_ACCOUNT: ${{ secrets.GCP_SERVICE_ACCOUNT }}
        run: |
          test -n "$PROJECT_ID" || { echo "Missing repository variable GCP_PROJECT_ID"; exit 1; }
          test -n "$RUNTIME_SERVICE_ACCOUNT" || { echo "Missing repository variable GCP_RUNTIME_SERVICE_ACCOUNT"; exit 1; }
          test -n "$WIF_PROVIDER" || { echo "Missing secret GCP_WORKLOAD_IDENTITY_PROVIDER"; exit 1; }
          test -n "$DEPLOYER_SERVICE_ACCOUNT" || { echo "Missing secret GCP_SERVICE_ACCOUNT"; exit 1; }

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Google Cloud SDK
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Verify Artifact Registry repository
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          gcloud artifacts repositories describe "$ARTIFACT_REPOSITORY" \
            --project "$PROJECT_ID" \
            --location "$REGION" >/dev/null

      - name: Configure Docker authentication
        run: gcloud auth configure-docker "${REGION}-docker.pkg.dev" --quiet

      - name: Build and push container
        id: image
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          IMAGE="${REGION}-docker.pkg.dev/${PROJECT_ID}/${ARTIFACT_REPOSITORY}/${SERVICE}:${GITHUB_SHA}"
          docker build --pull --tag "$IMAGE" .
          docker push "$IMAGE"
          echo "uri=$IMAGE" >> "$GITHUB_OUTPUT"

      - name: Create Cloud Run environment file
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          cat > "${RUNNER_TEMP}/cloud-run-env.yaml" <<EOF
          DJANGO_DEBUG: "False"
          DJANGO_ALLOWED_HOSTS: ".run.app,${PROJECT_ID}.web.app,${PROJECT_ID}.firebaseapp.com"
          DJANGO_CSRF_TRUSTED_ORIGINS: "https://*.run.app,https://${PROJECT_ID}.web.app,https://${PROJECT_ID}.firebaseapp.com"
          DJANGO_SECURE_SSL_REDIRECT: "True"
          DJANGO_HSTS_SECONDS: "31536000"
          DJANGO_LOG_LEVEL: "INFO"
          GUNICORN_WORKERS: "1"
          GUNICORN_THREADS: "4"
          GUNICORN_TIMEOUT: "60"
          EOF

      - name: Deploy migration job
        if: ${{ inputs.run_migrations }}
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          IMAGE: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run jobs deploy "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --command python \
            --args manage.py,migrate \
            --tasks 1 \
            --max-retries 1 \
            --task-timeout 10m \
            --env-vars-file "${RUNNER_TEMP}/cloud-run-env.yaml" \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DATABASE_URL=database-url:latest" \
            --quiet

          gcloud run jobs execute "$MIGRATION_JOB" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --wait \
            --quiet

      - name: Deploy Django to Cloud Run
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
          RUNTIME_SERVICE_ACCOUNT: ${{ vars.GCP_RUNTIME_SERVICE_ACCOUNT }}
          IMAGE: ${{ steps.image.outputs.uri }}
        run: |
          gcloud run deploy "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --image "$IMAGE" \
            --service-account "$RUNTIME_SERVICE_ACCOUNT" \
            --allow-unauthenticated \
            --port 8080 \
            --cpu 1 \
            --memory 512Mi \
            --concurrency 40 \
            --min-instances 0 \
            --max-instances 2 \
            --timeout 60 \
            --env-vars-file "${RUNNER_TEMP}/cloud-run-env.yaml" \
            --set-secrets "DJANGO_SECRET_KEY=django-secret-key:latest,DATABASE_URL=database-url:latest" \
            --quiet

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Deploy Firebase Hosting
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: npx --yes firebase-tools@latest deploy --only hosting --project "$PROJECT_ID" --non-interactive

      - name: Show deployment URLs
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        run: |
          echo "Firebase Hosting: https://${PROJECT_ID}.web.app"
          gcloud run services describe "$SERVICE" \
            --project "$PROJECT_ID" \
            --region "$REGION" \
            --format='value(status.url)'
