{% extends 'base.html' %}{% block title %}{{ post.title }} — BatikCraft Journal{% endblock %}{% block content %}<article class="article section-pad"><header><span class="eyebrow">Journal · {{ post.published_at|date:'d F Y' }}</span><h1>{{ post.title }}</h1><p>{{ post.excerpt }}</p></header>{% if post.cover_url %}<img class="article-cover" src="{{ post.cover_url }}" alt="{{ post.title }}">{% endif %}<div class="article-body">{{ post.content|linebreaks }}</div></article>{% endblock %}
