{% extends 'base.html' %}
{% load ui_i18n %}
{% block title %}{% t "nft.form.title" %} — BatikCraft{% endblock %}
{% block content %}
<section class="form-page section-pad">
  <div class="form-intro"><span class="eyebrow">{% t "form.creator_workspace" %}</span><h1>{% t "nft.form.title" %}.</h1><p>{% t "form.nft.body" %}</p></div>
  <form method="post" enctype="multipart/form-data" class="form-card">{% csrf_token %}{{ form.as_p }}<button class="btn btn-primary" type="submit"><i class="fa-solid fa-floppy-disk" aria-hidden="true"></i> {% t "form.save_draft" %}</button></form>
</section>
{% endblock %}
