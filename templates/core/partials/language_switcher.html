{% load ui_i18n %}
<form class="lang language-switcher{% if variant %} {{ variant }}{% endif %}" method="post" action="{% url 'set_ui_language' %}" aria-label="{% t 'language.label' %}">
  {% csrf_token %}
  <input type="hidden" name="next" value="{{ request.get_full_path }}">
  <button type="submit" name="language" value="id" class="language-option{% if ui_language == 'id' %} active{% endif %}">ID</button>
  <button type="submit" name="language" value="en" class="language-option{% if ui_language == 'en' %} active{% endif %}">EN</button>
</form>
