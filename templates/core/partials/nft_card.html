<article class="nft-card"><a class="nft-image" href="{% url 'nft_detail' nft.pk %}">{% if nft.display_image %}<img src="{{ nft.display_image }}" alt="{{ nft.title }}">{% else %}<div class="image-placeholder">BatikCraft</div>{% endif %}<span class="status-pill">Live Auction</span></a><div class="nft-info"><div><span>by {{ nft.owner.public_name }}</span><h3><a href="{% url 'nft_detail' nft.pk %}">{{ nft.title }}</a></h3></div><div class="price-row"><span>Current bid</span><strong>Rp{% if nft.max_bid %}{{ nft.max_bid|floatformat:0 }}{% else %}{{ nft.starting_price|floatformat:0 }}{% endif %}</strong></div><div class="card-meta"><span>{{ nft.bid_count }} bids</span><a href="{% url 'nft_detail' nft.pk %}">View →</a></div></div></article>
