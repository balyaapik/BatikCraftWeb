{% load ui_i18n %}
<div class="bob-captcha-box" aria-labelledby="captcha-label">
  <img
    class="bob-captcha-image"
    id="captcha-image"
    src="{% url 'captcha_image' %}"
    alt="{% t 'captcha.help' %}"
    width="250"
    height="76"
  >
  <div class="bob-captcha-field{% if form.captcha.errors %} has-error{% endif %}">
    <label id="captcha-label" for="{{ form.captcha.id_for_label }}">
      <i class="fa-solid fa-key" aria-hidden="true"></i>
      <span>{% t "captcha.input" %}</span>
    </label>
    {{ form.captcha }}
    {{ form.captcha.errors }}
  </div>
  <button class="bob-captcha-refresh" type="button" id="captcha-refresh" aria-label="{% t 'captcha.new' %}">
    <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
    <span>{% t "captcha.new" %}</span>
  </button>
</div>
<script>
  (() => {
    const button = document.getElementById("captcha-refresh");
    const image = document.getElementById("captcha-image");
    const input = document.getElementById("id_captcha");
    if (!button || !image) return;
    button.addEventListener("click", () => {
      image.src = "{% url 'captcha_image' %}?refresh=1&t=" + Date.now();
      if (input) {
        input.value = "";
        input.focus();
      }
    });
  })();
</script>
