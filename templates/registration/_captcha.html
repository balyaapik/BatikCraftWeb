<div class="captcha-box" aria-labelledby="captcha-label">
  <span id="captcha-label" class="eyebrow">
    <i class="fa-solid fa-shield-halved" aria-hidden="true"></i>
    Human verification
  </span>
  <div class="captcha-image-row">
    <img
      id="captcha-image"
      src="{% url 'captcha_image' %}"
      alt="Kode CAPTCHA. Ketik lima karakter yang terlihat pada gambar."
      width="250"
      height="76"
    >
    <button
      class="btn btn-secondary captcha-refresh"
      type="button"
      id="captcha-refresh"
      aria-label="Buat kode CAPTCHA baru"
    >
      <i class="fa-solid fa-rotate-right" aria-hidden="true"></i>
      <span>Kode baru</span>
    </button>
  </div>
  <div class="captcha-field{% if form.captcha.errors %} has-error{% endif %}">
    <label for="{{ form.captcha.id_for_label }}">
      <i class="fa-solid fa-key" aria-hidden="true"></i>
      <span>{{ form.captcha.label }}</span>
    </label>
    {{ form.captcha }}
    {{ form.captcha.errors }}
  </div>
  <p class="captcha-help">
    <i class="fa-solid fa-circle-info" aria-hidden="true"></i>
    <span>Masukkan lima karakter pada gambar. Huruf besar dan kecil dianggap sama.</span>
  </p>
</div>
<script>
  (() => {
    const button = document.getElementById("captcha-refresh");
    const image = document.getElementById("captcha-image");
    const input = document.getElementById("id_captcha");
    if (!button || !image) return;
    button.addEventListener("click", () => {
      image.src = "{% url 'captcha_image' %}?refresh=1&t=" + Date.now();
      if (input) {
        input.value = "";
        input.focus();
      }
    });
  })();
</script>
