{% if page_obj.paginator.num_pages > 1 %}
<nav class="admin-pagination" aria-label="Pagination">
  {% if page_obj.has_previous %}<a href="?page={{ page_obj.previous_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}{% if status %}&status={{ status }}{% endif %}{% if role %}&role={{ role }}{% endif %}{% if active %}&active={{ active }}{% endif %}">← Sebelumnya</a>{% else %}<span></span>{% endif %}
  <span>Halaman <strong>{{ page_obj.number }}</strong> dari {{ page_obj.paginator.num_pages }}</span>
  {% if page_obj.has_next %}<a href="?page={{ page_obj.next_page_number }}{% if query %}&q={{ query|urlencode }}{% endif %}{% if status %}&status={{ status }}{% endif %}{% if role %}&role={{ role }}{% endif %}{% if active %}&active={{ active }}{% endif %}">Berikutnya →</a>{% else %}<span></span>{% endif %}
</nav>
{% endif %}
